<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Mola 相机 · 邀请你加入</title>
  <style>
    :root { --accent:#C8924F; --accent2:#E8B978; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:#FDFBF7; color:#2A2113;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
    }
    .card {
      width:min(92vw,420px); background:#fff; border-radius:22px; padding:32px 24px;
      box-shadow:0 18px 50px rgba(120,90,30,.12); text-align:center;
    }
    .gift { font-size:54px; line-height:1; margin-bottom:6px; }
    h1 { font-size:21px; margin:8px 0 4px; }
    p.sub { color:#8a7c5e; font-size:14px; margin:0 0 22px; }
    .code-label { color:#8a7c5e; font-size:13px; margin-bottom:6px; }
    .code {
      font-size:30px; font-weight:800; letter-spacing:2px; color:var(--accent);
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace; margin-bottom:4px; word-break:break-all;
    }
    .btn {
      display:block; width:100%; border:0; border-radius:999px; padding:15px 16px; margin-top:14px;
      font-size:16px; font-weight:700; cursor:pointer; text-decoration:none;
    }
    .btn-primary { background:linear-gradient(90deg,var(--accent2),var(--accent)); color:#3A2A10; }
    .btn-ghost { background:#F3E6CE; color:#7A5A1E; }
    .tip { color:#a89878; font-size:12px; margin-top:18px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="gift">🎁</div>
    <h1>邀请你加入 Mola 相机</h1>
    <p class="sub">AI 拍照 / 智能美颜 / 3D 人物建模</p>

    <div class="code-label">邀请码</div>
    <div class="code" id="code">——</div>

    <a class="btn btn-primary" id="openBtn" href="#">打开 / 下载 App</a>
    <button class="btn btn-ghost" id="copyBtn">复制邀请码</button>

    <p class="tip">
      已安装 App：点上方按钮会自动打开并填入邀请码。<br/>
      未安装：点上方按钮会自动复制邀请码并带你去 App Store；安装后打开 App，进入「设置 → 邀请好友」会自动填好邀请码，点「确定」即可（也可手动粘贴）。
    </p>
  </div>

  <script>
    // ====== 配置 ======
    // App Store 下载地址
    var APP_STORE_URL = "https://apps.apple.com/cn/app/id6764097139";
    // 自定义 URL Scheme（与 App Info.plist 一致）
    var APP_SCHEME = "molacamera://invite";
    // ==================

    function getCode() {
      var m = new URLSearchParams(location.search).get("code") || "";
      return m.trim().toUpperCase();
    }
    var code = getCode();
    document.getElementById("code").textContent = code || "——";

    function schemeURL() {
      return APP_SCHEME + (code ? ("?code=" + encodeURIComponent(code)) : "");
    }

    // 尝试唤起 App；唤起失败（未安装）则在超时后跳 App Store。
    function openApp() {
      var start = Date.now();
      var fallback = setTimeout(function () {
        // 若页面仍可见（说明没跳进 App），且配置了商店地址，则跳转下载
        if (Date.now() - start < 2200 && APP_STORE_URL) {
          location.href = APP_STORE_URL;
        }
      }, 1500);
      // 页面被隐藏（已跳进 App）时取消跳转
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) clearTimeout(fallback);
      });
      location.href = schemeURL();
    }

    function copyCode() {
      if (!code) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).catch(function () {});
      }
      var t = document.createElement("textarea");
      t.value = code; t.setAttribute("readonly", ""); t.style.position = "absolute"; t.style.left = "-9999px";
      document.body.appendChild(t); t.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(t);
    }

    document.getElementById("openBtn").addEventListener("click", function (e) {
      e.preventDefault();
      // 用户手势内复制邀请码：未装 App 时安装后回到 App 可自动识别
      copyCode();
      openApp();
    });

    document.getElementById("copyBtn").addEventListener("click", function () {
      if (!code) return;
      copyCode();
      var b = document.getElementById("copyBtn");
      b.textContent = "已复制 ✓";
      setTimeout(function () { b.textContent = "复制邀请码"; }, 1500);
    });

    // 进入页面自动尝试唤起一次（部分浏览器需用户手势，失败则等用户点按钮）
    window.addEventListener("load", function () { setTimeout(openApp, 250); });
  </script>
</body>
</html>
